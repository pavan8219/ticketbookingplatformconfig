server:
  port: 8081
spring:
  datasource:
      url: jdbc:mysql://localhost:3309/ticketplatform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: root
      password: root
      driver-class-name: com.mysql.cj.jdbc.Driver
  
    jpa:
      hibernate:
        ddl-auto: update   # create | create-drop | update | validate
      show-sql: true
      properties:
        hibernate:
          format_sql: true
info:
  app:
    name: User Service
    description: User service is for registering users
    version: 1.0.0

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
     prefer-ip-address: true
     instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true
  endpoint:
    gateway:
      access: unrestricted
logging:
  level:
    org.springframework.cloud.gateway: INFO

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

