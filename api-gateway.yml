server:
  port: 8080

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
     prefer-ip-address: true
     instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: "*"
logging:
  level:
    org.springframework.cloud.gateway: INFO

info:
  app:
    name: API-GATEWAY
spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
