server:
  port: 8080

info:
  app:
    name: API Gateway
    description: Central API Gateway for Movie Ticket Booking Platform
    version: 1.0.0

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
     prefer-ip-address: true
     instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true
  endpoint:
    gateway:
      access: unrestricted
logging:
  level:
    org.springframework.cloud.gateway: INFO


spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
